<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="40" fill="#FF6B6B"/>
  <!-- Body -->
  <ellipse cx="96" cy="122" rx="42" ry="50" fill="#1C1C2E"/>
  <!-- Belly -->
  <ellipse cx="96" cy="128" rx="26" ry="32" fill="#FAFAFA"/>
  <!-- Wings -->
  <ellipse cx="57" cy="118" rx="14" ry="30" fill="#1C1C2E" transform="rotate(-14 57 118)"/>
  <ellipse cx="135" cy="118" rx="14" ry="30" fill="#1C1C2E" transform="rotate(14 135 118)"/>
  <!-- Head -->
  <circle cx="96" cy="67" r="30" fill="#1C1C2E"/>
  <!-- Face -->
  <ellipse cx="96" cy="70" rx="19" ry="17" fill="#2D2D44"/>
  <!-- Eyes -->
  <circle cx="87" cy="63" r="6.5" fill="white"/>
  <circle cx="105" cy="63" r="6.5" fill="white"/>
  <circle cx="88"  cy="64" r="4"   fill="#111"/>
  <circle cx="106" cy="64" r="4"   fill="#111"/>
  <circle cx="89"  cy="63" r="1.5" fill="white"/>
  <circle cx="107" cy="63" r="1.5" fill="white"/>
  <!-- Beak -->
  <polygon points="89,73 103,73 96,82" fill="#FF9F43"/>
  <!-- Scarf -->
  <rect x="66" y="91" width="60" height="13" rx="6" fill="#FFD93D"/>
  <circle cx="79"  cy="97" r="4.5" fill="#FF6B6B"/>
  <circle cx="96"  cy="97" r="4.5" fill="#FF6B6B"/>
  <circle cx="113" cy="97" r="4.5" fill="#FF6B6B"/>
  <!-- Feet -->
  <ellipse cx="82"  cy="168" rx="16" ry="7" fill="#FF9F43" transform="rotate(-10 82 168)"/>
  <ellipse cx="110" cy="168" rx="16" ry="7" fill="#FF9F43" transform="rotate(10 110 168)"/>
  <!-- Cheeks -->
  <circle cx="80" cy="72" r="7" fill="#FF6B6B" opacity="0.4"/>
  <circle cx="112" cy="72" r="7" fill="#FF6B6B" opacity="0.4"/>
</svg>
