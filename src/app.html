<!doctype html>
<html lang="es">
	<head>
		<!-- Google tag (gtag.js) — carga diferida hasta consentimiento -->
		<script async src="https://www.googletagmanager.com/gtag/js?id=G-8H0947XNKF"></script>
		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag(){dataLayer.push(arguments);}
			// Deniega analytics por defecto; se activa solo si el usuario acepta
			gtag('consent', 'default', {
				analytics_storage: 'denied',
				ad_storage: 'denied',
				wait_for_update: 500
			});
			gtag('js', new Date());
			gtag('config', 'G-8H0947XNKF');
			// Si ya dio consentimiento en una visita anterior, actívalo inmediatamente
			if (typeof localStorage !== 'undefined' && localStorage.getItem('pp_cookie_consent') === 'accepted') {
				gtag('consent', 'update', { analytics_storage: 'granted' });
			}
		</script>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
		<title>PinguPlay — Juegos educativos para niños</title>
		<meta name="description" content="38 juegos educativos para niños de 0-12 años con 15 niveles adaptativos. Aprende formas, colores, números, letras y más jugando con Pingu." />
		<meta name="theme-color" content="#FF6B6B" />
		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://pinguplay.mom/" />
		<meta property="og:title" content="PinguPlay — Juegos educativos para niños" />
		<meta property="og:description" content="38 juegos educativos para niños de 0-12 años con 15 niveles adaptativos. ¡Aprende jugando con Pingu!" />
		<meta property="og:image" content="https://pinguplay.mom/icon-512.png" />
		<meta property="og:image:width" content="512" />
		<meta property="og:image:height" content="512" />
		<meta property="og:locale" content="es_ES" />
		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary" />
		<meta name="twitter:title" content="PinguPlay — Juegos educativos para niños" />
		<meta name="twitter:description" content="38 juegos educativos para niños de 0-12 años con 15 niveles adaptativos. ¡Aprende jugando con Pingu!" />
		<meta name="twitter:image" content="https://pinguplay.mom/icon-512.png" />
		<!-- JSON-LD -->
		<script type="application/ld+json">
		{
		  "@context": "https://schema.org",
		  "@type": "WebApplication",
		  "name": "PinguPlay",
		  "url": "https://pinguplay.mom/",
		  "description": "38 juegos educativos para niños de 0-12 años con 15 niveles adaptativos",
		  "applicationCategory": "EducationalApplication",
		  "operatingSystem": "Web, iOS, Android",
		  "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR" },
		  "audience": { "@type": "EducationalAudience", "educationalRole": "student", "audienceType": "Children 0-12" },
		  "inLanguage": "es"
		}
		</script>
		<link rel="manifest" href="/manifest.json" />
		<link rel="icon" href="/icon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="/icon-192.png" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<script src="/analytics.js" defer></script>
		<script>
			if ('serviceWorker' in navigator) {
				window.addEventListener('load', function() {
					navigator.serviceWorker.register('/sw.js', { scope: '/' })
						.catch(function(e) { console.warn('[SW]', e); });
				});
			}
		</script>
	</body>
</html>
